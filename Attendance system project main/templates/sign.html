<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FaceLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="../static/images/adminlogin.css", rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4361ee 0%, #3f37c9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px 0;
            font-family: 'Poppins', sans-serif;
        }
        
        .wrapper {
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 400px;
            max-width: 90%;
            padding: 40px 30px;
            margin: 20px auto;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .name {
            font-weight: 600;
            font-size: 1.8rem;
            color: #4361ee;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        
        .form-field {
            padding-left: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #fff;
            display: flex;
            align-items: center;
        }
        
        .form-field .fas, .form-field .far {
            color: #4361ee;
            margin-right: 10px;
        }
        
        .form-field input {
            width: 100%;
            border: none;
            outline: none;
            background: none;
            font-size: 1rem;
            color: #666;
            padding: 12px 15px 12px 5px;
        }
        
        .btn {
            width: 100%;
            height: 45px;
            background-color: #4361ee;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn:hover {
            background-color: #3f37c9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(63, 55, 201, 0.3);
        }
        
        .text-center {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .text-center a {
            color: #4361ee;
            text-decoration: none;
            font-weight: 500;
        }
        
        .text-center a:hover {
            color: #3f37c9;
            text-decoration: underline;
        }
        
        .error {
            background-color: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 1rem;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            transform: translateX(-5px);
            color: #e0e0e0;
        }
    </style>
</head>
<body>
    <a href="/adminlogin" class="back-link">
        <i class="fas fa-arrow-left me-2"></i> Back to Login
    </a>
    
    <div class="wrapper">
        <div class="logo">
            <img src="../static/images/companylogo.jpg" alt="Company Logo">
        </div>
        <div class="text-center name">
            Create Account
        </div>
        <div class="text-center subtitle">
            Sign up for admin access
        </div>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form class="mt-3" action="/signup" method="POST">
            <div class="form-field d-flex align-items-center">
                <span class="far fa-user"></span>
                <input type="text" name="username" id="username" placeholder="Username" required>
            </div>
            <div class="form-field d-flex align-items-center">
                <span class="far fa-envelope"></span>
                <input type="email" name="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="form-field d-flex align-items-center">
                <span class="fas fa-key"></span>
                <input type="password" name="password" id="password" placeholder="Password" required>
            </div>
            <div class="form-field d-flex align-items-center">
                <span class="fas fa-lock"></span>
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
            </div>
            <button type="submit" class="btn">Sign Up</button>
        </form>
        
        <div class="text-center">
            Already have an account? <a href="/adminlogin">Login</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
